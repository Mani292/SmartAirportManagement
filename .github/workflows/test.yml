name: Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest httpx passlib "bcrypt<4.0.0"

      - name: Run Tests
        env:
          JWT_SECRET_KEY: testsecret
          GROQ_API_KEY: test
          PYTHONPATH: .
        run: cd backend && pytest tests/
